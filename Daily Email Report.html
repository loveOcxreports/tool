  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

r-bottom:2px solid var(--border);padding:6px 14px;display:flex;gap:5px;align-items:center;flex-wrap:wrap;}\n.toolbar a.back{padding:7px 11px;border-radius:6px;background:var(--navy);color:#fff;text-decoration:none;font:700 11px 'Sora';white-space:nowrap;}\n.tb-sep{width:1px;height:26px;background:var(--border);margin:0 3px;}\n.slot-btn{padding:7px 11px;border-radius:6px;border:1.5px solid var(--border);background:#fff;color:var(--text);cursor:pointer;font:700 11px 'Sora';transition:all .15s;}\n.slot-btn.on{background:var(--navy);color:#fff;border-color:var(--navy);}\n.spacer{flex:1;}\n.tb-btn{padding:7px 11px;border-radius:6px;border:none;cursor:pointer;font:700 11px 'Sora';white-space:nowrap;}\n.btn-edit{background:#7C3AED;color:#fff;}\n.btn-edit.editing{background:#DC2626;}\n.btn-add{background:#059669;color:#fff;}\n.btn-json{background:#0F766E;color:#fff;}\n.btn-app{background:#6D28D9;color:#fff;}\n.btn-sp{background:#059669;color:#fff;}\n.btn-refresh{background:#B45309;color:#fff;}\n.btn-reset{background:#475569;color:#fff;}\n.btn-email{background:#0078D4;color:#fff;}\n.btn-excel{background:#107C41;color:#fff;}\n.btn-print{background:var(--red);color:#fff;}\n#jsonInput{display:none;}\n/* Live data badge */\n.live-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:#ECFDF5;border:1.5px solid #6EE7B7;font:700 10px 'Sora';color:#065F46;white-space:nowrap;}\n.live-badge .dot{width:7px;height:7px;border-radius:50%;background:#10B981;animation:pulse 2s infinite;}\n@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}\n\n/* DOCUMENT — landscape style */\n.doc{width:900px;max-width:100%;margin:10px auto;background:#fff;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 2px 12px rgba(0,12,40,.07);}\n\n/* AGENT BANNER */\n.agent-banner{display:none;padding:7px 14px;background:#F0FDF4;border-bottom:1.5px solid #BBF7D0;font:700 12px 'Sora';color:#065F46;gap:8px;align-items:center;}\n.agent-banner.show{display:flex;}\n.agent-banner .ab-name{font:800 13px 'Sora';color:#064E3B;}\n.agent-badge{padding:3px 10px;border-radius:20px;background:#D1FAE5;color:#065F46;font:700 11px 'Sora';}\n.agent-banner .ab-right{margin-left:auto;font:600 11px 'Sora';color:#059669;}\n\n/* HEADER — compact landscape */\n.hd{background:linear-gradient(135deg,#0A1A4F,#001F5C 55%,#1a3a8f);color:#fff;padding:8px 14px;}\n.hd-top{display:flex;align-items:center;gap:10px;}\n.hd-icon{width:34px;height:34px;border-radius:7px;overflow:hidden;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.3);}\n.hd-icon img{width:100%;height:100%;object-fit:cover;}\n.hd-eyebrow{font:800 8px/1 'Sora';letter-spacing:.12em;color:var(--gold);text-transform:uppercase;margin-bottom:2px;}\n.hd-title{font:900 13px/1.2 'Sora';}\n.hd-sub{font:500 10px/1.3 'Sora';color:#cdd9ec;margin-top:1px;}\n.hd-meta{margin-left:auto;text-align:right;flex-shrink:0;}\n.hd-meta .big{font:900 15px/1 'JetBrains Mono';color:var(--gold);margin-bottom:2px;}\n.hd-meta .sm{font:600 10px/1.3 'Sora';color:#cdd9ec;}\n\n/* KPI — single compact row */\n.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:7px 14px;background:#F1F5F9;border-bottom:1.5px solid var(--border);}\n.kpi{padding:7px 12px;border-radius:7px;background:#fff;border:1.5px solid var(--border);position:relative;overflow:hidden;}\n.kpi::before{content:\"\";position:absolute;top:0;left:0;right:0;height:3px;}\n.kpi.k-tot::before{background:#1D4ED8;}.kpi.k-res::before{background:#16A34A;}\n.kpi.k-prg::before{background:#D97706;}.kpi.k-unr::before{background:#DC2626;}\n.kpi.k-pct::before{background:var(--gold);}\n.kpi .kl{font:800 8px/1 'Sora';text-transform:uppercase;letter-spacing:.10em;color:var(--muted);}\n.kpi .kv{font:900 20px/1 'JetBrains Mono';margin-top:4px;}\n.kpi.k-tot .kv{color:#1E3A8A;}.kpi.k-res .kv{color:var(--res);}\n.kpi.k-prg .kv{color:var(--prg);}.kpi.k-unr .kv{color:var(--unr);}\n.kpi.k-pct .kv{color:#92591E;}\n\n/* TABLE — landscape compact */\n.tbl-wrap{padding:8px 14px 10px;overflow-x:auto;}\ntable.t{width:100%;border-collapse:collapse;font-size:12px;border:1.5px solid #CBD5E1;}\ntable.t thead tr{background:var(--navy);}\ntable.t th{color:#ffffff;font:800 9px/1.2 'Sora';text-transform:uppercase;letter-spacing:.05em;padding:7px 8px;text-align:left;border-right:1px solid #33518a;}\ntable.t th:last-child{border-right:none;}\ntable.t th.r{text-align:right;}\ntable.t td{padding:6px 8px;border-bottom:1px solid #CBD5E1;border-right:1px solid #CBD5E1;vertical-align:middle;}\ntable.t td:last-child{border-right:none;}\ntable.t td.r{text-align:right;font-family:'JetBrains Mono',monospace;font-weight:700;}\ntable.t tbody tr:nth-child(even) td{background:#F8FAFC;}\ntable.t tbody tr:hover td{background:#EEF2F8;}\ntable.t tfoot td{background:var(--navy)!important;color:#fff;font:900 12px/1.3 'Sora';padding:7px 8px;border-right:1px solid #33518a;}\ntable.t tfoot td:last-child{border-right:none;}\ntable.t tfoot td.r{font-family:'JetBrains Mono',monospace;}\n\n.party-name{font:800 12px/1.2 'Sora';color:var(--navy);}\n.cat-name{font:500 10px/1.2 'Sora';color:var(--muted);margin-top:1px;}\n.pct-pill{display:inline-flex;padding:2px 8px;border-radius:20px;font-family:'JetBrains Mono',monospace;font-weight:900;font-size:11px;}\n.pct-hi{background:#ECFDF5;color:#065F46;}\n.pct-mid{background:#FFFBEB;color:#92400E;}\n.pct-lo{background:#FEF2F2;color:#991B1B;}\n\n/* EDIT MODE */\n.edit-cell{outline:none;min-width:28px;border-radius:3px;transition:background .1s;}\n.editing-mode .edit-cell[contenteditable=\"true\"]{background:#FFF9C4;cursor:text;box-shadow:inset 0 0 0 1.5px #FFC72C;padding:1px 3px;}\n.editing-mode .edit-cell[contenteditable=\"true\"]:focus{background:#FFFDE0;box-shadow:inset 0 0 0 2px #F59E0B;}\n\n\n.col-pct.hidden{display:none;}\n.col-today.hidden{display:none;}\n/* editable affordance */\n.editing-mode .kpi .kv{outline:1px dashed #93C5FD;outline-offset:2px;border-radius:4px;cursor:text;}\n.editing-mode .exec-summary{outline:1px dashed #7DD3FC;outline-offset:3px;cursor:text;}\n/* End-of-Month executive summary */\n.exec-summary{margin:0 14px 12px;padding:14px 16px;background:#F0F9FF;border:1.5px solid #BAE6FD;border-radius:8px;}\n.exec-summary .es-title{font:800 11px/1 'Sora';text-transform:uppercase;letter-spacing:.10em;color:#0369A1;margin-bottom:12px;}\n.exec-summary .es-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 24px;}\n.exec-summary .es-grid > div{font:600 13px/1.4 'Sora';color:#0F172A;}\n.exec-summary .es-grid b{color:#001F5C;}\n.exec-summary .es-note{margin-top:12px;padding:10px 14px;background:#fff;border-left:4px solid #0EA5E9;border-radius:4px;font:500 13px/1.5 'Sora';color:#0F172A;}\n.del-btn{background:none;border:none;cursor:pointer;color:#CBD5E1;font-size:13px;padding:1px 3px;border-radius:3px;transition:color .15s,background .15s;display:none;}\n.editing-mode .del-btn{display:inline-flex;}\n.del-btn:hover{color:var(--red);background:#FEF2F2;}\n\n/* EDIT NOTE */\n.edit-note{margin:6px 14px 0;padding:6px 12px;background:#FEF9E7;border:1px solid #FDE68A;border-radius:6px;font:600 11px/1.4 'Sora';color:#92400E;display:none;}\n.editing-mode .edit-note{display:block;}\n\n/* FOOTER */\n.ft{padding:8px 14px;border-top:1.5px solid var(--border);background:#F8FAFC;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}\n.ft img.lockup{height:24px;}\n.ft .meta{font:500 11px/1.4 'Sora';color:var(--muted);flex:1;}\n.ft .meta b{color:var(--navy);}\n.ft .stamp{font:700 10px 'JetBrains Mono';color:var(--muted);text-align:right;}\n\n/* APP SHELL — left command rail */\n.app{display:flex;align-items:flex-start;min-height:100vh;}\n.app-rail{position:sticky;top:0;height:100vh;overflow-y:auto;width:204px;flex-shrink:0;background:linear-gradient(165deg,#0A1A4F 0%,#001F5C 55%,#0a1230 100%);padding:16px 13px 22px;display:flex;flex-direction:column;gap:15px;box-shadow:inset -1px 0 0 rgba(255,255,255,.06),4px 0 24px rgba(0,0,0,.18);}\n.app-rail::-webkit-scrollbar{width:5p (Array.isArray(p)&&p.length&&p.every(r=>r&&typeof r.party==='string'&&r.party.trim()&&typeof r.cat==='string'&&r.cat.trim())){\n        return backfillLaunch(p);\n      }\n    }\n  }catch(e){}\n  try{ localStorage.removeItem('ekedp_rows_v3'); }catch(e){}\n  return DEFAULT_ROWS.map(r=>({...r}));\n}\n// Backfill the Launch-Month baseline onto saved rows that predate the field\nfunction backfillLaunch(rows){\n  const byParty={}; DEFAULT_ROWS.forEach(d=>{byParty[(d.party||'').toLowerCase().trim()]=d.launch;});\n  rows.forEach(r=>{\n    if(r.launch===undefined||r.launch===null||r.launch===''){\n      const m=byParty[(r.party||'').toLowerCase().trim()];\n      r.launch=(m===undefined?0:m);\n    }\n  });\n  return rows;\n}\nfunction saveRows(){try{localStorage.setItem('ekedp_rows_v3',JSON.stringify(GM_ROWS));}catch(e){}}\n\n// Manual overrides for KPI numbers + executive summary (per slot), so they can be typed in and stick\nlet KPI_OV  = loadOv('ekedp_kpiov');\nlet EXEC_OV = loadOv('ekedp_execov');\nfunction loadOv(k){try{const s=localStorage.getItem(k);if(s)return JSON.parse(s)||{};}catch(e){}return {};}\nfunction saveKpiOv(){try{localStorage.setItem('ekedp_kpiov',JSON.stringify(KPI_OV));}catch(e){}}\nfunction saveExecOv(){try{localStorage.setItem('ekedp_execov',JSON.stringify(EXEC_OV));}catch(e){}}\n\n// May 2026 month-close figures (brought forward until pending phases out) — editable\nlet MAY_CLOSE = loadMayClose();\nfunction loadMayClose(){try{const s=localStorage.getItem('ekedp_mayclose');if(s){const p=JSON.parse(s);if(p&&typeof p==='object')return Object.assign({recv:468,res:433,prg:20,unr:15,remaining:35},p);}}catch(e){}return {recv:468,res:433,prg:20,unr:15,remaining:35};}\nfunction saveMayClose(){try{localStorage.setItem('ekedp_mayclose',JSON.stringify(MAY_CLOSE));}catch(e){}}\nfunction mayClosePct(){const r=num(MAY_CLOSE.recv);return r?Math.round(num(MAY_CLOSE.res)/r*1000)/10:0;}\nfunction mayClosePending(){return (MAY_CLOSE.remaining!=null&&MAY_CLOSE.remaining!=='')?num(MAY_CLOSE.remaining):(num(MAY_CLOSE.prg)+num(MAY_CLOSE.unr));}\nfunction mayCloseOriginal(){return num(MAY_CLOSE.prg)+num(MAY_CLOSE.unr);}\nfunction mayBandRow(cols){\n  const p=mayClosePending(), pct=mayClosePct();\n  const cell=(lab,val,top,col)=>'<td style=\"background:#fff;border:1.5px solid #FED7AA;border-top:3px solid '+top+';text-align:center;padding:7px 8px;\"><div style=\"font:700 7px Arial;text-transform:uppercase;color:#9A3412;\">'+lab+'<\u002Fdiv><div style=\"font:900 20px \\'Courier New\\',monospace;color:'+col+';\">'+val+'<\u002Fdiv><\u002Ftd>';\n  return '<tr><td colspan=\"'+cols+'\" style=\"padding:8px 14px 4px;background:#FFF7ED;border-bottom:1.5px solid #FED7AA;\">'\n    +'<div style=\"font:800 9px Arial,sans-serif;text-transform:uppercase;letter-spacing:.10em;color:#9A3412;margin-bottom:5px;\">&#128197; MAY 2026 &mdash; BROUGHT FORWARD<\u002Fdiv>'\n    +'<table width=\"100%\" cellpadding=\"4\" cellspacing=\"4\"><tr>'\n    + cell('Total Received', num(MAY_CLOSE.recv), '#1D4ED8', '#1E3A8A')\n    + cell('Resolved', num(MAY_CLOSE.res), '#16A34A', '#065F46')\n    + cell('Pending (carried)', p, '#DC2626', '#991B1B')\n    + cell('In Progress', num(MAY_CLOSE.prg), '#D97706', '#92400E')\n    + cell('Unresolved', num(MAY_CLOSE.unr), '#7C3AED', '#6D28D9')\n    + cell('% Resolved', pct+'%', '#FFC72C', '#92591E')\n    +'<\u002Ftr><\u002Ftable><\u002Ftd><\u002Ftr>';\n}\n\n// ── HELPERS ──────────────────────────────────────────────────────────────────\nlet DATE_OVERRIDE=(function(){try{return localStorage.getItem('ekedp_date')||'';}catch(e){return '';}})();\nfunction todayLong(){\n  if(DATE_OVERRIDE) return DATE_OVERRIDE;\n  const w=new Date(new Date().toLocaleString('en-US',{timeZone:'Africa/Lagos'}));\n  return w.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});\n}\nfunction setReportDate(){\n  const v=prompt('Report date (e.g. Tuesday, 3 June 2026). Leave blank to auto-use today:', DATE_OVERRIDE||todayLong());\n  if(v===null) return;\n  DATE_OVERRIDE=v.trim();\n  try{ if(DATE_OVERRIDE) localStorage.setItem('ekedp_date',DATE_OVERRIDE); else localStorage.removeItem('ekedp_date'); }catch(e){}\n  render();\n  toast(DATE_OVERRIDE?('Report date set to '+DATE_OVERRIDE):'Date reset to today (auto)');\n}\nfunction watToday(){\n  return new Date(new Date().toLocaleString('en-US',{timeZone:'Africa/Lagos'})).toISOString().slice(0,10);\n}\nfunction pctClass(p){return p>=80?'pct-hi':p>=60?'pct-mid':'pct-lo';}\nfunction num(n){return isNaN(parseInt(n))?0:parseInt(n);}\n\n// ── HUB-COMPATIBLE DATE + REPORT-MONTH HELPERS ──────────────────────────────\n// Mirrors Managers Hub shiftWatDate(): tries every date field the Hub writes,\n// normalises to a WAT 'YYYY-MM-DD' string.\nfunction hubWatDate(t){\n  let raw=t.created||t.received||t.receivedAt||t.createdAt||t.date||t.Date||t.dateCreated||t.receivedDate||t.Created||t.timestamp||t.Timestamp||'';\n  if(!raw||typeof raw==='number')return null;\n  raw=String(raw).trim(); if(!raw)return null;\n  try{\n    let d=new Date(raw);\n    if(isNaN(d.getTime())){\n      const dm=raw.match(/^(\\d{1,2})\\/(\\d{1,2})\\/(\\d{4})/);\n      if(dm)d=new Date(dm[3]+'-'+dm[1].padStart(2,'0')+'-'+dm[2].padStart(2,'0'));\n      if(isNaN(d.getTime()))return null;\n    }\n    const wat=new Date(d.toLocaleString('en-US',{timeZone:'Africa/Lagos'}));\n    return wat.getFullYear()+'-'+String(wat.getMonth()+1).padStart(2,'0')+'-'+String(wat.getDate()).padStart(2,'0');\n  }catch(e){return null;}\n}\nconst MONTHS_FULL=['January','February','March','April','May','June','July','August','September','October','November','December'];\n// Report month ('YYYY-MM') derived from the chosen report date, else today (WAT).\nfunction reportYM(){\n  if(typeof DATE_OVERRIDE!=='undefined' && DATE_OVERRIDE){\n    const m=DATE_OVERRIDE.match(/(\\d{1,2})\\s+([A-Za-z]+)\\s+(\\d{4})/);\n    if(m){const mi=MONTHS_FULL.findIndex(x=>x.toLowerCase()===m[2].toLowerCase());if(mi>=0)return m[3]+'-'+String(mi+1).padStart(2,'0');}\n  }\n  return watToday().slice(0,7);\n}\nfunction reportMonthLabel(){const ym=reportYM(),p=ym.split('-');return MONTHS_FULL[parseInt(p[1])-1]+' '+p[0];}\n// Top open (in-progress + unresolved) categories for the exec summary, from live rows.\nfunction topOpenCats(n){\n  return GM_ROWS.map(r=>({cat:(r.cat||'').split('/')[0].trim(),open:num(r.prg)+num(r.unr)}))\n    .filter(x=>x.open>0).sort((a,b)=>b.open-a.open).slice(0,n||3);\n}\n// Data-driven executive-summary narrative + encouragement.\nfunction execNote(){\n  const t=computeTotals(), top=topOpenCats(3);\n  if(t.totGrand>0 && t.totPrg===0 && t.totUnr===0){\n    return 'Every complaint resolved this month &mdash; outstanding work, team. Let\\u2019s carry this momentum into the new month and keep every customer powered.';\n  }\n  const driver = top.length ? ('Open backlog is driven by '+top.map(x=>'<b>'+x.cat+' ('+x.open+')<\u002Fb>').join(', ')+'. ') : '';\n  return driver+'Team, let\\u2019s close these out swiftly &mdash; every prompt resolution keeps a customer powered and pushes our resolution rate above target. Thank you for the strong effort so far; keep it up!';\n}\n\n// ── JSON LOADER ──────────────────────────────────────────────────────────────\n// Fuzzy match category string against GM_ROWS[].cat\nfunction normCat(s){return (s||'').toLowerCase().trim().replace(/\\//g,' ').replace(/\\s+/g,' ');}\n\nfunction matchCat(catStr){\n  const jn = normCat(catStr);\n  if(!jn) return null;\n  // 1. Exact match\n  for(const r of GM_ROWS){\n    if(normCat(r.cat)===jn) return r;\n  }\n  // 2. First significant word match (len >= 4)\n  const jFirst = jn.split(' ').find(w=>w.length>=4)||jn.split(' ')[0];\n  for(const r of GM_ROWS){\n    if(normCat(r.cat).split(' ').find(w=>w.length>=4)===jFirst) return r;\n  }\n  // 3. Any significant word overlap (word len >= 5)\n  const jWords = jn.split(' ').filter(w=>w.length>=5);\n  for(const r of GM_ROWS){\n    const rWords = normCat(r.cat).split(' ');\n    if(jWords.some(w=>rWords.includes(w))) return r;\n  }\n  return null;\n}\n\n// Mirror the Managers Hub's matchParty(): assign a ticket to a responsible-party row\n// by responsible-name first (order-insensitive), then fall back to category.\nfunction normName(x){return String(x||'').toLowerCase().replace(/[^a-z ]/g,'').split(/\\s+/).filter(Boolean).sort().join(' ');}\nfunction matchPartyRow(t){\n  const resp=(t.resp||t.responsible||'').toString().trim();\n  if(resp){\n    const rs=normName(resp);\n    const byName=GM_ROWS.find(r=>normName(r.party)===rs);\n    if(byName) return byName;\n  }\n  return matchCat(t.category);\n}\n\nfunction loadJSON(event){\n  const file = event.target.files[0];\n  if(!file) return;\n  const reader = new FileReader();\n  reader.onload = function(e){\n    try{\n      const data = JSON.parse(e.target.result);\n      processJSON(data);\n    }catch(err){\n      toast('Could not parse JSON file: '+err.message,'warn');\n    }\n  };\n  reader.readAsText(file);\n  // Reset input so same file can be reloaded\n  event.target.value='';\n}\n\nfunction processJSON(data){\n  const tickets = data.tickets || data.data || (Array.isArray(data)?data:[]);\n  if(!tickets.length){ toast('No tickets found in JSON.','warn'); return; }\n\n  const agentName = (data.exportedBy&&data.exportedBy.name) ? data.exportedBy.name\n                  : (tickets[0]&&tickets[0].updatedBy) ? tickets[0].updatedBy\n                  : 'Unknown Agent';\n  const exportedAt = data.exportedAt || '';\n  const today = watToday();\n\n  // Count per responsible party EXACTLY like the Managers Hub (matchParty + shiftWatDate),\n  // scoped to the report month so the two screens always agree.\n  const reportMonth = reportYM();\n  GM_ROWS.forEach(r=>{r.today=0;r.res=0;r.prg=0;r.unr=0;});\n  for(const t of tickets){\n    const dDate  = hubWatDate(t);              // 'YYYY-MM-DD' or null (Hub shiftWatDate)\n    const dMonth = dDate ? dDate.slice(0,7) : '';\n    if(reportMonth && dMonth!==reportMonth) continue;   // only this month's tickets\n    const row = matchPartyRow(t);\n    if(!row) continue;\n    const s = (t.status||'').toLowerCase();\n    if(s==='resolved') row.res++;\n    else if(s==='progress') row.prg++;\n    else row.unr++;                            // unresolved + pending + anything else\n    if(dDate===today) row.today++;\n  }\n\n  // Smart carry-forward: May-2026-or-earlier tickets still open = remaining backlog\n  let mayOpen=0, mayFound=0;\n  for(const t of tickets){\n    const d=(t.created||t.receivedAt||t.date||'').slice(0,7);\n    if(d && d<='2026-05'){ mayFound++; if((t.status||'').toLowerCase()!=='resolved') mayOpen++; }\n  }\n  if(mayFound>0){ MAY_CLOSE.remaining = mayOpen; saveMayClose(); }\n\n  saveRows();\n\n  // Show agent banner\n  const banner = document.getElementById('agentBanner');\n  const updatedToday = tickets.filter(t=>{const d=t.updatedAt||t.modified||t.modifiedAt||t.created||'';return d.startsWith(today);}).length;\n  banner.classList.add('show');\n  document.getElementById('agentName').textContent = agentName;\n  document.getElementById('agentBadge').textContent = tickets.length+' tickets total';\n  document.getElementById('agentMeta').textContent =\n    updatedToday+' updated today · '+\n    (exportedAt ? new Date(exportedAt).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})+' WAT' : '');\n\n  render();\n  toast('✅ Loaded '+tickets.length+' tickets from '+agentName);\n}\n\n// ── RENDER ───────────────────────────────────────────────────────────────────\nfunction render(slotId){\n  CURRENT_SLOT = slotId||CURRENT_SLOT;\n  const slot = SLOTS[CURRENT_SLOT];\n  const isEOM   = CURRENT_SLOT==='5pm';\n  const show9am = CURRENT_SLOT==='9am';\n\n  document.getElementById('hd-eyebrow').textContent = '';\n  document.getElementById('hd-sub').textContent = todayLong()+' · '+slot.stamp+' · Customer Experience Department';\n  document.getElementById('slot-label').textContent  = slot.emoji+' '+slot.label;\n  document.getElementById('slot-window').textContent = slot.window;\n  document.getElementById('ft-stamp').textContent    = slot.stamp+' · '+todayLong();\n  document.querySelectorAll('.slot-btn').forEach(b=>{ b.classList.toggle('on',b.dataset.slot===CURRENT_SLOT); });\n  const kpiRowEl=document.getElementById('kpiRow'); if(kpiRowEl) kpiRowEl.style.display = isEOM ? 'grid' : 'none';\n\n  // ── THEAD ──\n  const thead = document.getElementById('thead');\n  if(isEOM){\n    thead.innerHTML = `<tr>\n      <th style=\"width:28px;color:#ffffff\">S/N<\u002Fth>\n      <th style=\"color:#ffffff\">Responsible Party<\u002Fth>\n      <th>Category<\u002Fth>\n      <th class=\"r\">Cumulative<br>Resolved<\u002Fth>\n      <th class=\"r\">Cumulative<br>In Progress<\u002Fth>\n      <th class=\"r\">Cumulative<br>Unresolved<\u002Fth>\n      <th class=\"r\">Grand<br>Total<\u002Fth>\n      <th style=\"width:22px\"><\u002Fth>\n    <\u002Ftr>`;\n  } else {\n    thead.innerHTML = `<tr>\n      <th style=\"width:28px;color:#ffffff\">S/N<\u002Fth>\n      <th style=\"color:#ffffff\">Responsible Party<\u002Fth>\n      <th>Category<\u002Fth>\n      <th class=\"r col-today\">Received<br>Today<\u002Fth>\n      <th class=\"r\">Cumulative<br>Resolved<\u002Fth>\n      <th class=\"r\">Cumulative<br>In Progress<\u002Fth>\n      <th class=\"r\">Cumulative<br>Unresolved<\u002Fth>\n      <th class=\"r\">Grand<br>Total<\u002Fth>\n      <th class=\"r col-pct\">%<br>Resolution<\u002Fth>\n      <th style=\"width:22px\"><\u002Fth>\n    <\u002Ftr>`;\n  }\n\n  // ── TBODY ──\n  const tbody = document.getElementById('tbody');\n  tbody.innerHTML = '';\n  GM_ROWS.forEach((r,i)=>{\n    const today  = show9am?0:num(r.today);\n    const res=num(r.res), prg=num(r.prg), unr=num(r.unr);\n    const launch = num(r.launch);\n    const grand  = res+prg+unr;\n    const pct    = grand?Math.round(res/grand*100):0;\n\n    const sn   = `<td style=\"font-family:'JetBrains Mono',monospace;font-weight:700;color:#1D4ED8;font-size:11px\">${r.sn}<\u002Ftd>`;\n    const party= `<td><div class=\"party-name edit-cell\" data-row=\"${i}\" data-field=\"party\" contenteditable=\"false\">${r.party}<\u002Fdiv><\u002Ftd>`;\n    const cat  = `<td><div class=\"cat-name edit-cell\" data-row=\"${i}\" data-field=\"cat\" contenteditable=\"false\" style=\"text-align:left\">${r.cat}<\u002Fdiv><\u002Ftd>`;\n    const resC = `<td class=\"r\" style=\"color:var(--res)\"><span class=\"edit-cell\" data-row=\"${i}\" data-field=\"res\" contenteditable=\"false\">${res}<\u002Fspan><\u002Ftd>`;\n    const prgC = `<td class=\"r\" style=\"color:var(--prg)\"><span class=\"edit-cell\" data-row=\"${i}\" data-field=\"prg\" contenteditable=\"false\">${prg}<\u002Fspan><\u002Ftd>`;\n    const unrC = `<td class=\"r\" style=\"color:var(--unr)\"><span class=\"edit-cell\" data-row=\"${i}\" data-field=\"unr\" contenteditable=\"false\">${unr}<\u002Fspan><\u002Ftd>`;\n    const grandC=`<td class=\"r gcell\" style=\"color:#1D4ED8;font-weight:800\">${grand}<\u002Ftd>`;\n    const del  = `<td><button class=\"del-btn\" onclick=\"deleteRow(${i})\" title=\"Remove\">🗑<\u002Fbutton><\u002Ftd>`;\n\n    const tr = document.createElement('tr');\n    if(isEOM){\n      const launchC = `<td class=\"r\" style=\"color:#6D28D9;font-weight:700;background:#F5F3FF;\"><span class=\"edit-cell\" data-row=\"${i}\" data-field=\"launch\" contenteditable=\"false\">${launch>0?launch:'—'}<\u002Fspan><\u002Ftd>`;\n      const todayC  = `<td class=\"r col-today\" style=\"color:#166534;font-weight:800;background:#F0FDF4;\"><span class=\"edit-cell\" data-row=\"${i}\" data-field=\"today\" contenteditable=\"false\">${today}<\u002Fspan><\u002Ftd>`;\n      tr.innerHTML = sn+party+cat+resC+prgC+unrC+grandC+del;\n    } else {\n      const launchC = `<td class=\"r\" style=\"color:#6D28D9;font-weight:700;background:#F5F3FF;\"><span class=\"edit-cell\" data-row=\"${i}\" data-field=\"launch\" contenteditable=\"false\">${launch>0?launch:'—'}<\u002Fspan><\u002Ftd>`;\n      const todayC = `<td class=\"r col-today\" style=\"color:#166534;font-weight:800;background:#F0FDF4;\"><span class=\"edit-cell\" data-row=\"${i}\" data-field=\"today\" contenteditable=\"false\">${show9am?'—':today}<\u002Fspan><\u002Ftd>`;\n      const pctC   = `<td class=\"r col-pct pcell\"><span class=\"pct-pill ${pctClass(pct)}\">${pct}%<\u002Fspan><\u002Ftd>`;\n      tr.innerHTML = sn+party+cat+todayC+resC+prgC+unrC+grandC+pctC+del;\n    }\n    tbody.appendChild(tr);\n  });\n\n  const t = computeTotals();\n  renderFoot(isEOM,show9am,t);\n  fillKpis(t);\n  renderExec(isEOM,slot,t);\n\n  // disable inline-edit affordances when not editing\n  if(EDIT_MODE){ applyEditMode(); }\n  else {\n    ['k-tot','k-res','k-prg','k-unr','k-pct'].forEach(id=>{const el=document.getElementById(id);if(el)el.contentEditable='false';});\n    const es=document.getElementById('execSummary'); if(es)es.contentEditable='false';\n  }\n}\n\nfunction computeTotals(){\n  const show9am=CURRENT_SLOT==='9am';\n  let totToday=0,totRes=0,totPrg=0,totUnr=0,totLaunch=0;\n  GM_ROWS.forEach(r=>{ totToday+=show9am?0:num(r.today); totRes+=num(r.res); totPrg+=num(r.prg); totUnr+=num(r.unr); totLaunch+=num(r.launch); });\n  const totGrand=totRes+totPrg+totUnr, totPct=totGrand?Math.round(totRes/totGrand*100):0;\n  return {totToday,totRes,totPrg,totUnr,totLaunch,totGrand,totPct};\n}\n\nfunction renderFoot(isEOM,show9am,t){\n  const tfoot=document.getElementById('tfoot');\n  if(isEOM){\n    tfoot.innerHTML = `<tr>\n      <td colspan=\"3\" class=\"r\" style=\"background:#001F5C;color:#fff;font:900 11px 'Sora';letter-spacing:.08em;\">TOTAL<\u002Ftd>\n      <td class=\"r\" style=\"background:#001F5C;color:#fff;font-weight:900\">${t.totRes}<\u002Ftd>\n      <td class=\"r\" style=\"background:#001F5C;color:#fff;font-weight:900\">${t.totPrg}<\u002Ftd>\n      <td class=\"r\" style=\"background:#001F5C;color:#fff;font-weight:900\">${t.totUnr}<\u002Ftd>\n      <td class=\"r\" style=\"background:#001F5C;color:#fff;font-weight:900\">${t.totGrand}<\u002Ftd>\n      <td style=\"background:#001F5C\"><\u002Ftd>\n    <\u002Ftr>`;\n  } else {\n    tfoot.innerHTML = '';\n  }\n}\n\nfunction fillKpis(t){\n  const ov=(KPI_OV[CURRENT_SLOT]||{});\n  const set=(id,val)=>{ const el=document.getElementById(id); if(!el)return; const o=ov[id]; el.textContent=(o!=null&&o!=='')?o:val; };\n  set('k-tot',t.totGrand); set('k-res',t.totRes); set('k-prg',t.totPrg); set('k-unr',t.totUnr); set('k-pct',t.totPct+'%');\n}\n\nfunction renderExec(isEOM,slot,t){\n  const es=document.getElementById('execSummary'); if(!es)return;\n  // Executive summary removed per GM request — hidden on every slot.\n  es.style.display='none'; es.innerHTML='';\n}\nfunction renderExec_DISABLED(isEOM,slot,t){\n  const es=document.getElementById('execSummary'); if(!es)return;\n  if(!isEOM){ es.style.display='none'; es.innerHTML=''; return; }\n  es.style.display='block';\n  const ov=EXEC_OV[CURRENT_SLOT];\n  if(ov!=null && ov!==''){ es.innerHTML=ov; return; }\n  es.innerHTML = `\n    <div class=\"es-title\">📊 End of Month — Executive Summary · ${reportMonthLabel()}<\u002Fdiv>\n    <div class=\"es-grid\">\n      <div>📥 <b>Total Complaints:<\u002Fb> ${t.totGrand}<\u002Fdiv>\n      <div>✅ <b>Resolved:<\u002Fb> ${t.totRes} (${t.totPct}%)<\u002Fdiv>\n      <div>🔄 <b>In Progress:<\u002Fb> ${t.totPrg}<\u002Fdiv>\n      <div>⚠️ <b>Unresolved:<\u002Fb> ${t.totUnr}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"es-note\">${execNote()}<\u002Fdiv>`;\n}\n\n// In-place recompute on edit — never rebuilds tbody, so the cursor never jumps\nfunction recompute(){\n  const isEOM=CURRENT_SLOT==='5pm', show9am=CURRENT_SLOT==='9am';\n  const trs=document.querySelectorAll('#tbody tr');\n  GM_ROWS.forEach((r,i)=>{\n    const res=num(r.res),prg=num(r.prg),unr=num(r.unr);\n    const grand=res+prg+unr, pct=grand?Math.round(res/grand*100):0;\n    const tr=trs[i]; if(!tr)return;\n    const g=tr.querySelector('.gcell'); if(g)g.textContent=grand;\n    const p=tr.querySelector('.pcell'); if(p)p.innerHTML='<span class=\"pct-pill '+pctClass(pct)+'\">'+pct+'%<\u002Fspan>';\n  });\n  const t=computeTotals();\n  renderFoot(isEOM,show9am,t);\n  fillKpis(t);   // respects manual overrides\n}\n\n// ── EDIT MODE ──\nfunction toggleEdit(){\n  EDIT_MODE=!EDIT_MODE;\n  const btn=document.getElementById('editBtn');\n  const addBtn=document.getElementById('addBtn');\n  btn.textContent=EDIT_MODE?'✅ Done':'✏️ Edit';\n  btn.classList.toggle('editing',EDIT_MODE);\n  addBtn.style.display=EDIT_MODE?'inline-flex':'none';\n  document.getElementById('doc').classList.toggle('editing-mode',EDIT_MODE);\n  if(EDIT_MODE) applyEditMode();\n  else render();\n}\n\nfunction applyEditMode(){\n  // table cells\n  document.querySelectorAll('#tbody .edit-cell').forEach(cell=>{\n    const field=cell.dataset.field;\n    const editable=!(field==='today'&&CURRENT_SLOT==='9am');\n    cell.contentEditable=editable?'true':'false';\n    cell.oninput=()=>{\n      const row=parseInt(cell.dataset.row);\n      let val=cell.textContent.trim();\n      if(field==='party'||field==='cat') GM_ROWS[row][field]=val;\n      else GM_ROWS[row][field]=isNaN(parseInt(val))?0:parseInt(val);\n      saveRows();\n      recompute();\n    };\n  });\n  // KPI numbers — directly typeable, persist as overrides\n  ['k-tot','k-res','k-prg','k-unr','k-pct'].forEach(id=>{\n    const el=document.getElementById(id); if(!el)return;\n    el.contentEditable='true';\n    el.oninput=()=>{ (KPI_OV[CURRENT_SLOT]=KPI_OV[CURRENT_SLOT]||{})[id]=el.textContent.trim(); saveKpiOv(); };\n  });\n  // Executive summary — editable rich text, persists\n  const es=document.getElementById('execSummary');\n  if(es && CURRENT_SLOT==='5pm'){\n    es.contentEditable='true';\n    es.oninput=()=>{ EXEC_OV[CURRENT_SLOT]=es.innerHTML; saveExecOv(); };\n  }\n}\n\nfunction recalcTotals(){ recompute(); }\n\nfunction addRow(){\n  const maxSn=GM_ROWS.reduce((m,r)=>Math.max(m,r.sn||0),0);\n  GM_ROWS.push({sn:maxSn+1,party:'New Party',cat:'New Category',launch:0,today:0,res:0,prg:0,unr:0});\n  saveRows(); render();\n}\nfunction deleteRow(i){\n  if(!confirm('Remove \"'+GM_ROWS[i].party+'\"?')) return;\n  GM_ROWS.splice(i,1);\n  GM_ROWS.forEach((r,idx)=>r.sn=idx+1);\n  saveRows(); render();\n}\n\n// ── LOAD FROM APP (reads ek_v2_tickets from localStorage) ───────────────────\nasync function loadFromSharePoint(){\n  const url=(function(){try{return localStorage.getItem('ek_pa_pull_url');}catch(e){return null;}})();\n  if(!url){toast('No SharePoint URL saved. Open Managers Hub → Cloud Sync and save your Pull URL first.','warn');return;}\n  const btn=document.getElementById('spBtn');\n  if(btn){btn.disabled=true;btn.textContent='⟳ Pulling…';}\n  try{\n    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})});\n    if(!res.ok) throw new Error('HTTP '+res.status);\n    const data=await res.json();\n    let incoming=[];\n    if(Array.isArray(data)) incoming=data;\n    else if(Array.isArray(data.tickets)) incoming=data.tickets;\n    else if(Array.isArray(data.value)) incoming=data.value;\n    if(!incoming.length){toast('SharePoint returned no tickets — check your PA flow.','warn');return;}\n    let existing=[];\n    try{const s=localStorage.getItem('ek_v2_tickets');if(s)existing=JSON.parse(s);}catch(e){}\n    const byNum={};\n    existing.forEach(function(t,i){if(t.num)byNum[String(t.num).trim().toLowerCase()]=i;});\n    let added=0,updated=0;\n    incoming.forEach(function(t){\n      const k=String(t.num||'').trim().toLowerCase();\n      if(k&&byNum[k]!==undefined){existing[byNum[k]]=Object.assign({},existing[byNum[k]],t);updated++;}\n      else{existing.push(t);if(k)byNum[k]=existing.length-1;added++;}\n    });\n    try{localStorage.setItem('ek_v2_tickets',JSON.stringify(existing));}catch(e){}\n    loadFromApp();\n    toast('✅ SharePoint — '+added+' new · '+updated+' updated');\n  }catch(e){\n    toast('⚠️ SharePoint pull failed: '+e.message,'warn');\n  }finally{\n    if(btn){btn.disabled=false;btn.textContent='⬇ SharePoint';}\n  }\n}\nfunction loadFromApp(){\n  try{\n    const raw=localStorage.getItem('ek_v2_tickets');\n    if(!raw){toast('No app data found. Open Managers Hub or Agents Hub first, then return here.','warn');return;}\n    const tickets=JSON.parse(raw);\n    if(!Array.isArray(tickets)||!tickets.length){toast('App data is empty — log some tickets first.','warn');return;}\n    processJSON({tickets,exportedBy:{name:'EKEDP App (Live)'},exportedAt:new Date().toISOString()});\n    const badge=document.getElementById('liveBadge');\n    const lbl=document.getElementById('liveLabel');\n    badge.style.display='inline-flex';\n    lbl.textContent='Live · '+tickets.length+' tickets';\n    toast('✅ Loaded '+tickets.length+' tickets from App Data');\n  }catch(e){toast('Error reading app data: '+e.message,'warn');}\n}\nfunction refreshFromApp(){\n  loadFromApp();\n}\n// Reset: clear manual edits/overrides + saved rows, then re-pull live from the Managers Hub\nfunction resetReport(){\n  if(!confirm('Reset this report?\\n\\nThis clears manual cell edits, KPI/summary overrides and the saved date, then re-pulls fresh figures from the Managers Hub. Your Hub data is not touched.'))return;\n  try{ ['ekedp_rows_v3','ekedp_kpiov','ekedp_execov','ekedp_date','ekedp_mayclose'].forEach(k=>localStorage.removeItem(k)); }catch(e){}\n  KPI_OV={}; EXEC_OV={}; DATE_OVERRIDE='';\n  GM_ROWS = DEFAULT_ROWS.map(r=>Object.assign({},r,{today:0,res:0,prg:0,unr:0,launch:0}));\n  const raw=(function(){try{return localStorage.getItem('ek_v2_tickets');}catch(e){return null;}})();\n  if(raw){\n    try{\n      const tix=JSON.parse(raw);\n      if(Array.isArray(tix)&&tix.length){ processJSON({tickets:tix,exportedBy:{name:'EKEDP App (reset)'},exportedAt:new Date().toISOString()}); toast('↺ Reset — re-pulled '+tix.length+' tickets from the Hub'); return; }\n    }catch(e){}\n  }\n  saveRows(); render();\n  toast('↺ Report reset to a clean template. Open your Managers Hub, then Load from App.');\n}\n\n// ── COPY FOR OUTLOOK ─────────────────────────────────────────────────────────\nfunction buildOutlookHTML(){\n  const slot = SLOTS[CURRENT_SLOT];\n  const is5pm = CURRENT_SLOT==='5pm';\n  const show9am = CURRENT_SLOT==='9am';\n  const navy='#001F5C';\n\n  let tRes=0,tPrg=0,tUnr=0,tTodaySum=0;\n  GM_ROWS.forEach(r=>{ tRes+=num(r.res); tPrg+=num(r.prg); tUnr+=num(r.unr); tTodaySum+=(show9am?0:num(r.today)); });\n  const tGrand=tRes+tPrg+tUnr;\n  const tPct=(tGrand?Math.round(tRes/tGrand*100):0)+'%';\n\n  const cols = is5pm ? 7 : 9;\n  const th=(label,extra)=>'<td bgcolor=\"#001F5C\" style=\"padding:7px 8px;background:'+navy+';background-color:'+navy+';color:#ffffff;font:800 9px Arial,sans-serif;text-transform:uppercase;'+(extra||'')+'border-right:1px solid #33518a;\"><font color=\"#ffffff\"><span style=\"color:#ffffff;mso-style-textfill-fill-color:#ffffff;\">'+label+'<\u002Fspan><\u002Ffont><\u002Ftd>';\n\n  const header = '<tr><td bgcolor=\"#001F5C\" colspan=\"'+cols+'\" style=\"padding:10px 14px;background:'+navy+';background-color:'+navy+';\">'+\n      '<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\"><tr>'+\n        '<td width=\"48\" style=\"vertical-align:middle;padding-right:11px;\"><img src=\"'+ICON_B64+'\" width=\"40\" height=\"40\" alt=\"EKEDP\" style=\"display:block;border-radius:8px;border:0;\"/><\u002Ftd>'+\n        '<td style=\"vertical-align:middle;\">'+\n          '<div style=\"font:800 8px Arial,sans-serif;letter-spacing:.12em;color:#FFC72C;text-transform:uppercase;\">EKEDP Customer Experience<\u002Fdiv>'+\n          '<div style=\"font:900 15px Arial,sans-serif;color:#ffffff;margin-top:2px;\">EKEDP EMAIL REPORT<\u002Fdiv>'+\n          '<div style=\"font:500 10px Arial,sans-serif;color:#cdd9ec;margin-top:2px;\">'+todayLong()+' &middot; '+slot.stamp+' &middot; Customer Experience Department<\u002Fdiv>'+\n        '<\u002Ftd>'+\n        '<td style=\"text-align:right;vertical-align:middle;white-space:nowrap;\">'+\n          '<div style=\"font:900 16px \\'Courier New\\',monospace;color:#FFC72C;\">'+slot.emoji+' '+slot.label+'<\u002Fdiv>'+\n          '<div style=\"font:600 10px Arial,sans-serif;color:#cdd9ec;\">'+slot.window+'<\u002Fdiv>'+\n        '<\u002Ftd>'+\n      '<\u002Ftr><\u002Ftable>'+\n    '<\u002Ftd><\u002Ftr>';\n\n  const footerNote = '<tr><td colspan=\"'+cols+'\" style=\"padding:8px 14px;background:#F8FAFC;border-top:1.5px solid #CBD5E1;font:600 11px Arial,sans-serif;color:#64748B;\">Generated by the <b>EKEDP<\u002Fb> &middot; Customer Experience Department &nbsp;&middot;&nbsp; '+slot.stamp+' &middot; '+todayLong()+'<\u002Ftd><\u002Ftr>';\n\n  const tcell=(v,col,bg)=>'<td style=\"padding:6px 8px;border:1px solid #CBD5E1;text-align:right;font:700 12px \\'Courier New\\',monospace;color:'+col+';'+(bg?'background:'+bg+';':'')+'\">'+v+'<\u002Ftd>';\n  const fcell=(v)=>'<td bgcolor=\"#001F5C\" style=\"padding:7px 8px;border:1px solid '+navy+';background:'+navy+';background-color:'+navy+';color:#ffffff;font:900 12px \\'Courier New\\',monospace;text-align:right;\"><font color=\"#ffffff\"><span style=\"color:#ffffff;\">'+v+'<\u002Fspan><\u002Ffont><\u002Ftd>';\n\n  if(is5pm){\n    // KPI cards mirror the on-screen 5PM row\n    const kpi=(label,val,top,col)=>'<td style=\"background:#fff;border:1.5px solid #CBD5E1;border-top:3px solid '+top+';text-align:center;padding:7px 8px;\"><div style=\"font:700 7px Arial;text-transform:uppercase;color:#64748B;\">'+label+'<\u002Fdiv><div style=\"font:900 17px \\'Courier New\\',monospace;color:'+col+';\">'+val+'<\u002Fdiv><\u002Ftd>';\n    const kpiRow='<tr><td colspan=\"7\" style=\"padding:8px 14px;background:#F1F5F9;border-bottom:1.5px solid #CBD5E1;\"><table width=\"100%\" cellpadding=\"4\" cellspacing=\"4\"><tr>'+\n      kpi('Grand Total June 2026',tGrand,'#1D4ED8','#1E3A8A')+\n      kpi('Resolved',tRes,'#16A34A','#065F46')+\n      kpi('In Progress',tPrg,'#D97706','#92400E')+\n      kpi('Unresolved',tUnr,'#DC2626','#991B1B')+\n      kpi('% Resolution',tPct,'#FFC72C','#92591E')+\n    '<\u002Ftr><\u002Ftable><\u002Ftd><\u002Ftr>';\n\n    const headRow='<tr>'+th('S/N')+th('Responsible Party')+th('Category')+th('Cumulative<br>Resolved','text-align:right;')+th('Cumulative<br>In Progress','text-align:right;')+th('Cumulative<br>Unresolved','text-align:right;')+th('Grand<br>Total','text-align:right;')+'<\u002Ftr>';\n\n    let rows='';\n    GM_ROWS.forEach((r,i)=>{\n      const res2=num(r.res),prg2=num(r.prg),unr2=num(r.unr),grand=res2+prg2+unr2;\n      const bg=i%2===0?'#ffffff':'#F8FAFC';\n      rows+='<tr style=\"background:'+bg+';\">'+\n        '<td style=\"padding:6px 8px;border:1px solid #CBD5E1;font:700 11px \\'Courier New\\',monospace;color:#1D4ED8;\">'+r.sn+'<\u002Ftd>'+\n        '<td style=\"padding:6px 8px;border:1px solid #CBD5E1;font:700 12px Arial,sans-serif;color:#001F5C;\">'+r.party+'<\u002Ftd>'+\n        '<td style=\"padding:6px 8px;border:1px solid #CBD5E1;font:400 11px Arial,sans-serif;color:#64748B;\">'+r.cat+'<\u002Ftd>'+\n        tcell(res2,'#065F46')+tcell(prg2,'#92400E')+tcell(unr2,'#991B1B')+\n        '<td style=\"padding:6px 8px;border:1px solid #CBD5E1;text-align:right;font:900 12px \\'Courier New\\',monospace;color:#1D4ED8;background:#EFF4FF;\">'+grand+'<\u002Ftd>'+\n      '<\u002Ftr>';\n    });\n    const foot='<tr><td bgcolor=\"#001F5C\" colspan=\"3\" style=\"padding:7px 8px;border:1px solid '+navy+';background:'+navy+';background-color:'+navy+';color:#ffffff;font:900 11px Arial,sans-serif;text-align:right;letter-spacing:.08em;\"><font color=\"#ffffff\"><span style=\"color:#ffffff;\">TOTAL<\u002Fspan><\u002Ffont><\u002Ftd>'+fcell(tRes)+fcell(tPrg)+fcell(tUnr)+fcell(tGrand)+'<\u002Ftr>';\n    return '<table width=\"640\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"font-family:Arial,sans-serif;background:#ffffff;border:1.5px solid #CBD5E1;border-radius:8px;overflow:hidden;border-collapse:collapse;mso-table-lspace:0pt;mso-table-rspace:0pt;\">'+header+kpiRow+headRow+rows+foot+footerNote+'<\u002Ftable>';\n  }\n\n  // ── NON-5PM (9 AM / 12 PM / 4 PM) — mirrors on-screen columns ──\n  const headRow='<tr>'+th('S/N')+th('Responsible Party')+th('Category')+\n    '<td bgcolor=\"#166534\" style=\"padding:7px 8px;background:#166534;background-color:#166534;color:#ffffff;font:800 9px Arial,sans-serif;text-transform:uppercase;text-align:right;border-right:1px solid #33518a;\"><font color=\"#ffffff\"><span style=\"color:#ffffff;\">Received<br>Today<\u002Fspan><\u002Ffont><\u002Ftd>'+\n    th('Cumulative<br>Resolved','text-align:right;')+th('Cumulative<br>In Progress','text-align:right;')+th('Cumulative<br>Unresolved','text-align:right;')+th('Grand<br>Total','text-align:right;')+th('%<br>Resolution','text-align:right;')+'<\u002Ftr>';\n\n  let rows='';\n  GM_ROWS.forEach((r,i)=>{\n    const res2=num(r.res),prg2=num(r.prg),unr2=num(r.unr),grand=res2+prg2+unr2;\n    const pct2=grand?Math.round(res2/grand*100):0;\n    const bg=i%2===0?'#ffffff':'#F8FAFC';\n    const pctCol=pct2>=80?'#065F46':pct2>=60?'#92400E':'#991B1B';\n    const pctBg =pct2>=80?'#ECFDF5':pct2>=60?'#FFFBEB':'#FEF2F2';\n    rows+='<tr style=\"background:'+bg+';\">'+\n      '<td style=\"padding:6px 8px;border:1px solid #CBD5E1;font:700 11px \\'Courier New\\',monospace;color:#1D4ED8;\">'+r.sn+'<\u002Ftd>'+\n      '<td style=\"padding:6px 8px;border:1px solid #CBD5E1;font:700 12px Arial,sans-serif;color:#001F5C;\">'+r.party+'<\u002Ftd>'+\n      '<td style=\"padding:6px 8px;border:1px solid #CBD5E1;font:400 11px Arial,sans-serif;color:#64748B;\">'+r.cat+'<\u002Ftd>'+\n      tcell(show9am?'&mdash;':num(r.today),'#166534','#F0FDF4')+tcell(res2,'#065F46')+tcell(prg2,'#92400E')+tcell(unr2,'#991B1B')+\n      '<td style=\"padding:6px 8px;border:1px solid #CBD5E1;text-align:right;font:900 12px \\'Courier New\\',monospace;color:#1D4ED8;background:#EFF4FF;\">'+grand+'<\u002Ftd>'+\n      '<td style=\"padding:6px 8px;border:1px solid #CBD5E1;text-align:right;\"><span style=\"padding:2px 8px;border-radius:20px;font:900 11px \\'Courier New\\',monospace;background:'+pctBg+';color:'+pctCol+';\">'+pct2+'%<\u002Fspan><\u002Ftd>'+\n    '<\u002Ftr>';\n  });\n  return '<table width=\"640\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"font-family:Arial,sans-serif;background:#ffffff;border:1.5px solid #CBD5E1;border-radius:8px;overflow:hidden;border-collapse:collapse;mso-table-lspace:0pt;mso-table-rspace:0pt;\">'+header+headRow+rows+footerNote+'<\u002Ftable>';\n}\n\nfunction copyEmail(){\n  const html = buildOutlookHTML();\n  if(navigator.clipboard&&window.ClipboardItem){\n    const blob=new Blob([html],{type:'text/html'});\n    const item=new ClipboardItem({'text/html':blob});\n    navigator.clipboard.write([item])\n      .then(()=>toast('✅ Copied! Paste into Outlook with Ctrl+V.'))\n      .catch(()=>legacyCopy(html));\n  } else {\n    legacyCopy(html);\n  }\n}\nfunction legacyCopy(html){\n  const tmp=document.createElement('div');\n  tmp.innerHTML=html;\n  tmp.style.position='fixed';tmp.style.left='-9999px';\n  document.body.appendChild(tmp);\n  const range=document.createRange();\n  range.selectNode(tmp);\n  const sel=window.getSelection();\n  sel.removeAllRanges();sel.addRange(range);\n  try{document.execCommand('copy');sel.removeAllRanges();toast('✅ Copied! Paste into Outlook with Ctrl+V.');}\n  catch(e){sel.removeAllRanges();toast('Press Ctrl+A then Ctrl+C to copy, then paste into Outlook.','warn');}\n  document.body.removeChild(tmp);\n}\n\n// ── EXCEL EXPORT ─────────────────────────────────────────────────────────────\nfunction downloadExcel(){\n  if(typeof XLSX==='undefined'){toast('Excel library loading — try again.','warn');return;}\n  const slot=SLOTS[CURRENT_SLOT];\n  const aoa=[\n    ['EKEDP EMAIL REPORT'],\n    [todayLong()+' · '+slot.stamp+' · Customer Experience Department'],\n    [],\n    ['S/N','Responsible Party','Category','Received Today','Cumulative Resolved','Cumulative In Progress','Cumulative Unresolved','Grand Total','% Resolution'],\n  ];\n  let tT=0,tR=0,tP=0,tU=0;\n  GM_ROWS.forEach(r=>{\n    const today=CURRENT_SLOT==='9am'?0:num(r.today);\n    const res=num(r.res),prg=num(r.prg),unr=num(r.unr),grand=res+prg+unr;\n    tT+=today;tR+=res;tP+=prg;tU+=unr;\n    aoa.push([r.sn,r.party,r.cat,today,res,prg,unr,grand,grand?res/grand:0]);\n  });\n  const tG=tR+tP+tU;\n  aoa.push(['','','TOTAL',tT,tR,tP,tU,tG,tG?tR/tG:0]);\n  const ws=XLSX.utils.aoa_to_sheet(aoa);\n  ws['!cols']=[{wch:4},{wch:26},{wch:36},{wch:12},{wch:12},{wch:14},{wch:14},{wch:11},{wch:11}];\n  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:8}},{s:{r:1,c:0},e:{r:1,c:8}}];\n  const wb=XLSX.utils.book_new();\n  XLSX.utils.book_append_sheet(wb,ws,'Report');\n  XLSX.writeFile(wb,'EKEDP_Report_'+slot.label.replace(' ','')+'_'+new Date().toISOString().slice(0,10)+'.xlsx');\n  toast('Excel downloaded.');\n}\n\n// ── TOAST ────────────────────────────────────────────────────────────────────\nfunction toast(msg,type='ok'){\n  let t=document.getElementById('_toast');\n  if(!t){t=document.createElement('div');t.id='_toast';document.body.appendChild(t);}\n  t.style.cssText='position:fixed;bottom:18px;right:18px;z-index:9999;padding:12px 16px;border-radius:9px;font:700 12px Sora,sans-serif;color:#fff;box-shadow:0 6px 24px rgba(0,0,0,.25);max-width:360px;line-height:1.4;';\n  t.style.background=type==='warn'?'#D97706':'#16A34A';\n  t.textContent=msg;\n  clearTimeout(t._to);\n  t._to=setTimeout(()=>t.remove(),5000);\n}\n\n// ── SLOTS ────────────────────────────────────────────────────────────────────\ndocument.querySelectorAll('.slot-btn').forEach(b=>{\n  b.addEventListener('click',()=>render(b.dataset.slot));\n});\n\n// ── AUTO SLOT ────────────────────────────────────────────────────────────────\n// Locked to the 4 PM report\nrender('4pm');\n\n// ── AUTO-LOAD DISABLED ───────────────────────────────────────────────────────\n// Data now loads only when the user clicks \"⚡ Load from App\" (or Refresh).\n// The report opens with its de
